version: '3.8'
services:
  app:
    build: .
    ports:
      - "7000:7000"
      - "50051:50051"
    environment:
      - JWT_SECRET=dev-secret-change-me
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=encuestas
      - GRPC_PORT=50051
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

