<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Encuestas Offline — Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-login">
<div class="bg-wrap"></div>
<div class="bg-grid"></div>

<div class="login-wrap">
    <div class="login-card">

        <div class="logo-mark">
            <!-- Clipboard icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 2a1 1 0 00-.894.553L7.382 4H5a2 2 0 00-2 2v13a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-2.382l-.724-1.447A1 1 0 0015 2H9zM9 4h6l1 2H8L9 4zM5 8h14v11H5V8zm3 3a1 1 0 100 2h8a1 1 0 100-2H8zm0 4a1 1 0 100 2h5a1 1 0 100-2H8z"/>
            </svg>
        </div>

        <div class="login-title">Encuestas Offline</div>
        <div class="login-sub">Inicia sesión para gestionar tus formularios.</div>

        <div id="loginError"></div>

        <label class="input-label" for="email">Correo electrónico</label>
        <input id="email" type="email" class="form-control-custom" placeholder="usuario@dominio.com">

        <label class="input-label" for="password">Contraseña</label>
        <input id="password" type="password" class="form-control-custom" placeholder="••••••••">

        <button id="btnLogin" class="btn-login">Entrar</button>

        <div class="demo-badge">
            <span>Credenciales de demostración</span>
            admin@encuestas.local &nbsp;/&nbsp; admin123
        </div>
    </div>
</div>

<div class="corner-tag">v1.0 · offline</div>

<script src="/js/auth.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
