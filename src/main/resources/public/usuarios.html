<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios - Encuestas Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-app page-users">

<!-- ── NAVBAR ─────────────────────────────────────────── -->
<nav class="app-nav">
    <div class="nav-brand">
        <div class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75M9 11a4 4 0 100-8 4 4 0 000 8z" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        Administración de usuarios
    </div>
    <div class="nav-right">
        <a href="/encuestas.html" class="btn-nav primary">← Encuestas</a>
        <span id="sessionStatus" class="badge-session">No autenticado</span>
        <button id="btnLogout" type="button" class="btn-nav danger">Salir</button>
    </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────────── -->
<div class="main-wrap">

    <div class="page-header">
        <div class="page-title">
            Usuarios
            <small>Gestiona los accesos al sistema</small>
        </div>
    </div>

    <!-- Create user panel -->
    <div class="panel">
        <div class="panel-header">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="panel-title">Crear nuevo usuario</span>
        </div>
        <div class="panel-body">
            <form id="formUsuario">
                <div class="create-grid">
                    <input id="uNombre" class="ctrl" placeholder="Nombre completo">
                    <input id="uEmail" class="ctrl" placeholder="Correo electrónico" required>
                    <input id="uPassword" type="password" class="ctrl" placeholder="Contraseña" required>
                    <select id="uRol" class="ctrl">
                        <option value="OPERADOR">OPERADOR</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <div class="btn-create-row">
                        <button class="btn-create" type="submit" style="width:100%;">Crear usuario</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Users list panel -->
    <div class="panel">
        <div class="panel-header">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span class="panel-title">Usuarios registrados</span>
        </div>
        <ul id="listaUsuarios">
            <li>
                <div class="empty-state">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 018 0v2"/></svg>
                    Cargando usuarios…
                </div>
            </li>
        </ul>
    </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/users.js"></script>
</body>
</html>
