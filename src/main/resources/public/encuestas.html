<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Encuestas - Encuestas Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-app">

<!-- ── NAVBAR ─────────────────────────────────────────── -->
<nav class="app-nav">
    <div class="nav-brand">
        <div class="dot"></div>
        Encuestas Offline
    </div>
    <div class="nav-right">
        <a id="navAdmin" href="/usuarios.html" class="btn-nav d-none">Usuarios</a>
        <span id="sessionStatus" class="badge-session">No autenticado</span>
        <button id="btnLogout" type="button" class="btn-nav danger">Salir</button>
    </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────────── -->
<div class="main-wrap">

    <!-- Page header -->
    <div class="page-header">
        <div class="page-title">
            Mis Encuestas
            <small>Gestión y registro de formularios de campo</small>
        </div>
        <button class="btn-new" id="btnAbrirModal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva encuesta
        </button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Total guardadas</div>
            <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Pendientes sync</div>
            <div class="value amber" id="statPendientes">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Sincronizadas</div>
            <div class="value green" id="statSync">0</div>
        </div>
    </div>

    <!-- Sync button -->
    <div class="mb-4">
        <button id="btnSync" class="btn-sync">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
            Sincronizar pendientes
        </button>
    </div>

    <!-- Pending list -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Pendientes locales</span>
        </div>
        <div class="panel-body" style="padding: .5rem 0;">
            <ul id="listaPendientes"></ul>
        </div>
    </div>

    <!-- Map -->
    <div id="mapa"></div>

</div><!-- /main-wrap -->


<!-- ── MODAL: Nueva encuesta ─────────────────────────── -->
<div class="modal-backdrop-custom" id="modalEncuesta">
    <div class="modal-box">
        <div class="modal-head">
            <h5>Nueva encuesta</h5>
            <button class="modal-close" id="btnCerrarModal">&times;</button>
        </div>
        <div class="modal-body">
            <form id="formEncuesta">
                <div class="form-row">
                    <input id="nombre" required class="ctrl" placeholder="Nombre del encuestado">
                    <input id="sector" required class="ctrl" placeholder="Sector / Zona">
                </div>
                <div class="form-row" style="align-items:center;">
                    <select id="nivelEscolar" class="ctrl" required>
                        <option value="">Nivel escolar…</option>
                        <option>BASICO</option>
                        <option>MEDIO</option>
                        <option>GRADO</option>
                        <option>POSTGRADO</option>
                        <option>DOCTORADO</option>
                    </select>
                    <div>
                        <span id="geoStatus" class="badge-geo">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            Sin geolocalización
                        </span>
                    </div>
                </div>
                <div class="mb-3">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <button type="button" id="btnFoto" class="btn-foto">📷 Tomar foto</button>
                </div>
                <button class="btn-save" type="submit">Guardar local</button>
            </form>
        </div>
    </div>
</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/webcam-easy/dist/webcam-easy.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/db.js"></script>
<script src="/js/sync.js"></script>
<script src="/js/encuestas.js"></script>
</body>
</html>
