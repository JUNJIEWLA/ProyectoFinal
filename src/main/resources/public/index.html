<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Encuestas Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="card">
        <div class="card-body">
            <h1 class="h4">Encuestas Offline</h1>
            <p class="mb-3">Redirigiendo...</p>
            <a href="/login.html" class="btn btn-primary btn-sm">Ir a login</a>
            <a href="/encuestas.html" class="btn btn-outline-secondary btn-sm">Ir a encuestas</a>
        </div>
    </div>
</div>
<script>
    (function () {
        const token = localStorage.getItem('token');
        const usuario = localStorage.getItem('usuario');
        if (token && usuario) {
            location.replace('/encuestas.html');
            return;
        }
        location.replace('/login.html');
    })();
</script>
</body>
</html>
