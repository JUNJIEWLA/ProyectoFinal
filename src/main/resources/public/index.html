<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Encuestas Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light">
<div class="container py-3">
    <h1 class="h4 mb-3">Encuestas Offline</h1>

    <div class="card mb-3">
        <div class="card-body">
            <h2 class="h6">Login</h2>
            <div class="row g-2">
                <div class="col-md-5">
                    <input id="email" class="form-control" placeholder="email">
                </div>
                <div class="col-md-5">
                    <input id="password" type="password" class="form-control" placeholder="password">
                </div>
                <div class="col-md-2 d-grid">
                    <button id="btnLogin" class="btn btn-primary">Entrar</button>
                </div>
            </div>
            <small class="text-muted">Demo: admin@encuestas.local / admin123</small>
            <div class="d-flex justify-content-between align-items-center mt-2">
                <small id="sessionStatus" class="text-muted">No autenticado</small>
                <button id="btnLogout" type="button" class="btn btn-outline-secondary btn-sm d-none">Salir</button>
            </div>
        </div>
    </div>

    <div id="adminUsuariosCard" class="card mb-3 d-none">
        <div class="card-body">
            <h2 class="h6">Usuarios (Admin)</h2>
            <form id="formUsuario" class="row g-2">
                <div class="col-md-4"><input id="uNombre" class="form-control" placeholder="Nombre"></div>
                <div class="col-md-3"><input id="uEmail" class="form-control" placeholder="Email" required></div>
                <div class="col-md-3"><input id="uPassword" type="password" class="form-control" placeholder="Password" required></div>
                <div class="col-md-2">
                    <select id="uRol" class="form-select">
                        <option value="OPERADOR">OPERADOR</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="col-12 d-grid">
                    <button class="btn btn-primary" type="submit">Crear usuario</button>
                </div>
            </form>
            <ul id="listaUsuarios" class="list-group mt-3"></ul>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <h2 class="h6">Nuevo formulario</h2>
            <form id="formEncuesta" class="row g-2">
                <div class="col-md-6"><input id="nombre" required class="form-control" placeholder="Nombre"></div>
                <div class="col-md-6"><input id="sector" required class="form-control" placeholder="Sector"></div>
                <div class="col-md-6">
                    <select id="nivelEscolar" class="form-select" required>
                        <option value="">Nivel escolar</option>
                        <option>BASICO</option>
                        <option>MEDIO</option>
                        <option>GRADO</option>
                        <option>POSTGRADO</option>
                        <option>DOCTORADO</option>
                    </select>
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <span id="geoStatus" class="badge text-bg-secondary">Sin geolocalizacion</span>
                </div>
                <div class="col-12">
                    <video id="webcam" class="w-100 rounded" autoplay playsinline></video>
                    <canvas id="canvas" class="d-none"></canvas>
                    <button type="button" id="btnFoto" class="btn btn-outline-secondary btn-sm mt-2">Tomar foto</button>
                </div>
                <div class="col-12 d-grid">
                    <button class="btn btn-success" type="submit">Guardar local</button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-grid mb-3">
        <button id="btnSync" class="btn btn-warning">Sincronizar pendientes</button>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <h2 class="h6">Pendientes locales</h2>
            <ul id="listaPendientes" class="list-group"></ul>
        </div>
    </div>

    <div id="mapa" style="height: 320px" class="rounded border"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/webcam-easy/dist/webcam-easy.min.js"></script>
<script src="/js/db.js"></script>
<script src="/js/sync.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
